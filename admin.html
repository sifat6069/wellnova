<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallNova Admin</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#090b14;
    color:white;
    font-family:Poppins,sans-serif;
}

.admin{
    width:90%;
    max-width:700px;
    margin:120px auto;
    background:#141726;
    padding:30px;
    border-radius:20px;
}

.admin h1{
    margin-bottom:25px;
}

.admin input,
.admin select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

.admin button{
    width:100%;
    padding:15px;
    background:#8b5cf6;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

.admin button:hover{
    background:#7c3aed;
}

#wallpaperList{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="admin">

<h1>WallNova Admin Panel</h1>

<input
id="title"
type="text"
placeholder="Wallpaper Title">

<input
id="image"
type="text"
placeholder="Image URL">

<select id="category">

<option value="Nature">Nature</option>

<option value="Cars">Cars</option>

<option value="Anime">Anime</option>

<option value="Gaming">Gaming</option>

<option value="AMOLED">AMOLED</option>

<option value="Space">Space</option>

</select>

<button id="saveBtn">
Add Wallpaper
</button>

<hr style="margin:35px 0;">

<h2>All Wallpapers</h2>

<div id="wallpaperList">

<!-- Wallpapers will appear here -->

</div>

</div>

<script type="module" src="admin.js?v=5"></script>

</body>
</html>
