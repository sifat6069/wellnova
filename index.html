<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallNova - HD Wallpapers</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- ================= HEADER ================= -->

<header>

<div class="logo">

🖼️ WallNova

</div>

<div class="search">

<input
type="text"
id="searchBox"
placeholder="Search Wallpapers...">

</div>

<div class="user-area">

<button id="loginBtn">

Login with Google

</button>

<div class="user-info">

<img
id="userPhoto"
src=""
alt=""
style="display:none;">

<span id="userName"></span>

</div>

</div>

</header>

<!-- ================= CATEGORY ================= -->

<section class="categories">

<button data-category="Nature">Nature</button>

<button data-category="Cars">Cars</button>

<button data-category="Animals">Animals</button>

<button data-category="Anime">Anime</button>

<button data-category="Technology">Technology</button>

<button data-category="Gaming">Gaming</button>

<button data-category="Dark">Dark</button>

<button data-category="Space">Space</button>

<button data-category="Abstract">Abstract</button>

<button data-category="Mountains">Mountains</button>

<button data-category="City">City</button>

<button data-category="Flowers">Flowers</button>

</section>

<!-- ================= HERO ================= -->

<section class="hero">

<h1>

Download Free HD & 4K Wallpapers

</h1>

<p>

Powered by Pexels API

</p>

</section>

<!-- ================= GALLERY ================= -->

<section class="gallery">

</section>

<!-- ================= LOADING ================= -->

<div id="loading">

Loading Wallpapers...

</div>

<!-- ================= PREVIEW ================= -->

<div id="previewContainer"></div>

<!-- ================= FOOTER ================= -->

<footer>

© 2026 WallNova. All Rights Reserved.

</footer>

<!-- ================= SCRIPT ================= -->

<script type="module" src="js/app.js"></script>

</body>
</html>
