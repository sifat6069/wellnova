<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallNova</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">
WallNova
</div>

<nav>
    <a href="#">Home</a>
    <a href="#">Categories</a>
    <a href="#">Trending</a>
    <a href="#">Latest</a>
    <a href="#">About</a>

    <img id="userPhoto" src="" style="width:40px;height:40px;border-radius:50%;display:none;">

    <span id="userName"></span>

    <button id="loginBtn" onclick="googleLogin()">Login</button>
</nav>

</header>


<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>
            Discover Amazing <br>
            Wallpapers
        </h1>

        <p>
            Download Free HD & 4K Wallpapers
        </p>

        <input
            id="searchBox"
            type="text"
            placeholder="🔍 Search Wallpapers..."
        >

    </div>

</section>

<section class="categories">

<button data-category="All">All</button>

<button data-category="Nature">Nature</button>

<button data-category="Cars">Cars</button>

<button data-category="Anime">Anime</button>

<button data-category="AMOLED">AMOLED</button>

<button data-category="Gaming">Gaming</button>

<button data-category="Space">Space</button>

</section>


<section class="gallery">
</section>
<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>

</html>
